name: Scrape Harris County Leads

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 02:00 CDT daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── Scrape ──────────────────────────────────────────────────────────────
      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p dashboard data
          python scraper/fetch.py

      # ── Commit results ───────────────────────────────────────────────────────
      - name: Commit & push records
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update records $(date -u '+%Y-%m-%d %H:%M UTC')"
          file_pattern: |
            dashboard/records.json
            data/records.json
            data/ghl_export_*.csv

  # ── Deploy dashboard to GitHub Pages ────────────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # get the freshly-committed records.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
